<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BU Grade Computation Portal — compute your semester GWA and check President's/Dean's Lister or Latin Honors eligibility. Free, private, and entirely in your browser. No login required."
    />
    <meta name="theme-color" content="#00a2e8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>BU Grade Computation Portal</title>
    <!--
      Pairs with public/404.html: decodes the redirected path/query/hash
      back into a normal URL via history.replaceState, before React Router
      mounts. Only ever does anything when it finds the "?/" marker that
      404.html adds, so it's a no-op on every normal navigation.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

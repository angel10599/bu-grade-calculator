    <!--
      Pairs with public/404.html: decodes the redirected path/query/hash
      back into a normal URL via history.replaceState, before React Router
      mounts. Only ever does anything when it finds the "?/" marker that
      404.html adds, so it's a no-op on every normal navigation.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
